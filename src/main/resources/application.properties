# web \u670D\u52A1\u914D\u7F6E
server.port=8080

##langchain4j \u914D\u7F6E
#langchain4j.open-ai.chat-model.api-key=demo
#langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
#langchain4j.open-ai.chat-model.base-url=http://langchain4j.dev/demo/openai/v1

# \u8BF7\u6C42\u54CD\u5E94\u65E5\u5FD7
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

##DeepSeek
#langchain4j.open-ai.chat-model.base-url=https://api.deepseek.com
#langchain4j.open-ai.chat-model.api-key=${DEEP_SEEK_API_KEY}
#
##DeepSeek-V3
#langchain4j.open-ai.chat-model.model-name=deepseek-chat

# \u901A\u4E49\u5343\u95EE\u914D\u7F6E
langchain4j.community.dashscope.chat-model.api-key=${DASH_SCOPE_API_KEY}
langchain4j.community.dashscope.chat-model.model-name=qwen-max

# \u517C\u5BB9\u6A21\u5F0F -deepseek
langchain4j.open-ai.chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.chat-model.api-key=${DASH_SCOPE_API_KEY}
langchain4j.open-ai.chat-model.model-name=deepseek-v3
# \u6E29\u5EA6\u53C2\u6570\u8303\u56F4 0 \u5230 1\uFF0C\u63A7\u5236\u8F93\u51FA\u7684\u968F\u673A\u6027
# \u503C\u8D8A\u9AD8\u8F93\u51FA\u8D8A\u968F\u673A\uFF0C0.9 \u8868\u793A\u8F83\u9AD8\u7684\u968F\u673A\u6027
langchain4j.open-ai.chat-model.temperature=0.9

#DeepSeek-R1 \u63A8\u7406\u6A21\u578B
#langchain4j.open-ai.chat-model.model-name=deepseek-reasoner
# \u8BBE\u7F6E\u65E5\u5FD7\u7EA7\u522B\u4E3A info
logging.level.root=info

#MongoDB\u8FDE\u63A5\u914D\u7F6E
spring.data.mongodb.uri=mongodb://192.168.10.101:27017/chat_memory_db

# \u57FA\u672C\u6570\u636E\u6E90\u914D\u7F6E
spring.datasource.url=jdbc:mysql://192.168.10.101:3306/guiguxiaozhi?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#\u96C6\u6210\u963F\u91CC\u901A\u4E49\u5343\u95EE-\u6D41\u5F0F\u8F93\u51FA
langchain4j.community.dashscope.streaming-chat-model.api-key=${DASH_SCOPE_API_KEY}
langchain4j.community.dashscope.streaming-chat-model.model-name=qwen-plus

#\u96C6\u6210\u963F\u91CC\u901A\u4E49\u5343\u95EE-\u901A\u7528\u6587\u672C\u5411\u91CF-v3
langchain4j.community.dashscope.embedding-model.api-key=${DASH_SCOPE_API_KEY}
langchain4j.community.dashscope.embedding-model.model-name=text-embedding-v3
# \u5F00\u542F SQL \u65E5\u5FD7\u6253\u5370
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# \u6307\u5B9A\u626B\u63CF\u7684\u5305
mybatis-plus.mapper-locations=classpath:com/itjaing/java/mapper/xml/*.xml